services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scooter_rental}
      POSTGRES_USER: ${POSTGRES_USER:-scooter_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - scooter_db_data:/var/lib/postgresql/data
      - ./database/migrations/001_production_schema.sql:/docker-entrypoint-initdb.d/001-production-schema.sql:ro
      - ./database/seeds/dev_seed.sql:/docker-entrypoint-initdb.d/002-dev-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scooter_user} -d ${POSTGRES_DB:-scooter_rental}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DB_URL: ${COMPOSE_DB_URL:-jdbc:postgresql://db:5432/scooter_rental}
      DB_USERNAME: ${DB_USERNAME:-scooter_user}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_DRIVER: ${DB_DRIVER:-org.postgresql.Driver}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://scootergo.top:3000,http://www.scootergo.top:3000,http://scootergo.top,https://scootergo.top,http://www.scootergo.top,https://www.scootergo.top,http://localhost:3000,http://127.0.0.1:3000}
      PASSWORD_RESET_URL_TEMPLATE: ${PASSWORD_RESET_URL_TEMPLATE:?Set PASSWORD_RESET_URL_TEMPLATE in .env}
      BOOTSTRAP_DEFAULT_MANAGER_ENABLED: ${BOOTSTRAP_DEFAULT_MANAGER_ENABLED:?Set BOOTSTRAP_DEFAULT_MANAGER_ENABLED=false in .env unless intentionally bootstrapping a manager}
      EMAIL_NOTIFICATIONS_ENABLED: ${EMAIL_NOTIFICATIONS_ENABLED:-false}
      EMAIL_FROM: ${EMAIL_FROM:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      SMS_NOTIFICATIONS_ENABLED: ${SMS_NOTIFICATIONS_ENABLED:-false}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  scooter_db_data:
