<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Scooter Map</title>
  <script>
    window._AMapSecurityConfig = {
      securityJsCode: "0c59d62b0abc528a3fca91b787cf7c66"
    }
  </script>
  <script src="https://webapi.amap.com/loader.js"></script>
  <style>
    :root {
      --map-blue: #2563eb;
      --map-blue-dark: #1d4ed8;
      --text-strong: #1f2937;
      --text-muted: #6b7280;
      --surface: rgba(255, 255, 255, 0.98);
      --status-available: #16a34a;
      --status-in-use: #dc2626;
      --status-maintenance: #d97706;
      --status-available-soft: #ecfdf5;
      --status-in-use-soft: #fff1f2;
      --status-maintenance-soft: #fffbeb;
      --status-available-soft-2: #d1fae5;
      --status-in-use-soft-2: #ffe4e6;
      --status-maintenance-soft-2: #fef3c7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      width: 100%;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .marker-available,
    .marker-in-use,
    .marker-maintenance {
      border: 3px solid #fff;
      border-radius: 50% 50% 50% 0;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
      transform: rotate(-45deg);
    }

    .marker-available {
      background: linear-gradient(135deg, var(--status-available), #15803d);
    }

    .marker-in-use {
      background: linear-gradient(135deg, var(--status-in-use), #b91c1c);
    }

    .marker-maintenance {
      background: linear-gradient(135deg, var(--status-maintenance), #b45309);
    }

    .marker-inner {
      align-items: center;
      color: #fff;
      display: flex;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 11px;
      font-weight: 800;
      height: 100%;
      justify-content: center;
      letter-spacing: 0.08em;
      text-indent: 0.08em;
      transform: rotate(45deg);
      width: 100%;
    }

    .amap-info-content {
      background: transparent;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      padding: 0;
    }

    .amap-info-sharp {
      display: none;
    }

    .amap-info-close {
      color: #94a3b8;
      right: 10px !important;
      top: 8px !important;
    }

    .legacy-leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      padding: 0;
      position: relative;
      z-index: 99999;
    }

    .legacy-leaflet-popup-pane,
    .legacy-leaflet-popup {
      z-index: 99998 !important;
    }

    .legacy-leaflet-popup-content {
      margin: 0;
      width: 280px !important;
    }

    .legacy-leaflet-popup-tip-container {
      display: none;
    }

    .popup-card {
      background: var(--surface);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      position: relative;
      z-index: 100000;
    }

    .popup-header {
      align-items: center;
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
    }

    .popup-avatar {
      align-items: center;
      border-radius: 12px;
      display: flex;
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 800;
      height: 44px;
      justify-content: center;
      letter-spacing: 0.08em;
      width: 44px;
    }

    .popup-avatar.available {
      background: linear-gradient(135deg, var(--status-available-soft), var(--status-available-soft-2));
      color: var(--status-available);
    }

    .popup-avatar.in-use {
      background: linear-gradient(135deg, var(--status-in-use-soft), var(--status-in-use-soft-2));
      color: var(--status-in-use);
    }

    .popup-avatar.maintenance {
      background: linear-gradient(135deg, var(--status-maintenance-soft), var(--status-maintenance-soft-2));
      color: var(--status-maintenance);
    }

    .popup-heading {
      min-width: 0;
    }

    .popup-id {
      color: var(--text-strong);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .popup-model {
      color: #9ca3af;
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }

    .popup-status {
      align-items: center;
      border-radius: 999px;
      display: inline-flex;
      font-size: 12px;
      font-weight: 700;
      gap: 6px;
      margin-bottom: 14px;
      padding: 5px 10px;
    }

    .popup-status.available {
      background: var(--status-available-soft);
      color: var(--status-available);
    }

    .popup-status.in-use {
      background: var(--status-in-use-soft);
      color: var(--status-in-use);
    }

    .popup-status.maintenance {
      background: var(--status-maintenance-soft);
      color: var(--status-maintenance);
    }

    .popup-dot {
      background: currentColor;
      border-radius: 50%;
      height: 6px;
      width: 6px;
    }

    .popup-meta {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .popup-meta-item {
      align-items: center;
      background: #f8fafc;
      border-radius: 12px;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      padding: 10px 12px;
    }

    .popup-meta-label {
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
    }

    .popup-meta-value {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      text-align: right;
    }

    .popup-price-summary {
      background: #eff6ff;
      border: 1px solid rgba(37, 99, 235, 0.12);
      border-radius: 14px;
      margin-bottom: 14px;
      padding: 12px 14px;
    }

    .popup-price-title {
      color: var(--map-blue);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .popup-price-note {
      color: #475569;
      font-size: 12px;
      line-height: 1.45;
    }

    .popup-btn {
      background: linear-gradient(135deg, var(--map-blue), var(--map-blue-dark));
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      padding: 12px;
      width: 100%;
    }

    .popup-btn:disabled {
      background: #e5e7eb;
      box-shadow: none;
      color: #9ca3af;
      cursor: not-allowed;
    }

    .store-marker {
      align-items: center;
      background: linear-gradient(135deg, var(--store-color), var(--store-color-dark));
      border: 3px solid #fff;
      border-radius: 14px 14px 14px 4px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.28);
      color: #fff;
      display: flex;
      height: 42px;
      justify-content: center;
      position: relative;
      transform: rotate(-45deg);
      width: 42px;
    }

    .store-marker::after {
      background: rgba(255, 255, 255, 0.24);
      border-radius: 50%;
      content: "";
      height: 18px;
      position: absolute;
      width: 18px;
    }

    .store-marker-inner {
      align-items: center;
      display: flex;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 11px;
      font-weight: 900;
      height: 100%;
      justify-content: center;
      letter-spacing: 0.05em;
      line-height: 1;
      position: relative;
      text-indent: 0.05em;
      transform: rotate(45deg);
      width: 100%;
      z-index: 1;
    }

    .store-popup-card {
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 18px;
    }

    .store-popup-eyebrow {
      color: var(--store-color);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.14em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .store-popup-name {
      color: var(--text-strong);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .store-popup-meta {
      align-items: center;
      background: rgba(37, 99, 235, 0.08);
      border-radius: 999px;
      color: var(--map-blue);
      display: inline-flex;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 12px;
      padding: 6px 10px;
    }

    .store-popup-address {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .user-location-marker {
      position: relative;
    }

    .user-dot {
      background: var(--map-blue);
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.5);
      height: 16px;
      width: 16px;
    }

    .user-pulse {
      animation: pulse 2s ease-out infinite;
      background: rgba(37, 99, 235, 0.2);
      border-radius: 50%;
      height: 32px;
      left: -8px;
      position: absolute;
      top: -8px;
      width: 32px;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
        transform: scale(0.5);
      }

      100% {
        opacity: 0;
        transform: scale(2);
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const MAP_DEFAULT_VIEW = Object.freeze({
      center: [53.8008, -1.5491],
      zoom: 15
    })

    const STATUS_META = Object.freeze({
      AVAILABLE: {
        buttonLabel: "Ride Now",
        label: "Available",
        markerClass: "marker-available",
        popupClass: "available"
      },
      IN_USE: {
        buttonLabel: "Unavailable",
        label: "In Use",
        markerClass: "marker-in-use",
        popupClass: "in-use"
      },
      MAINTENANCE: {
        buttonLabel: "Unavailable",
        label: "Maintenance",
        markerClass: "marker-maintenance",
        popupClass: "maintenance"
      }
    })

    const PACKAGE_PRICING = Object.freeze({
      oneHour: 3.5,
      oneDay: 30,
      oneWeek: 100,
      oneMonth: 280
    })

    const UI_TEXT = Object.freeze({
      avatarLabel: "SC",
      batteryLabel: "Battery",
      noLocation: "No location info",
      noValue: "--",
      packageHeadline: `Packages from ${formatCny(PACKAGE_PRICING.oneHour)} / hour`,
      packageLine: `Day ${formatCny(PACKAGE_PRICING.oneDay)} | Week ${formatCny(PACKAGE_PRICING.oneWeek)} | Month ${formatCny(PACKAGE_PRICING.oneMonth)}`
    })

    const DEFAULT_STORES = Object.freeze([
      {
        id: "chengdu-taikoo",
        city: "Chengdu",
        name: "Taikoo Li Mobility Store",
        type: "Pickup + Walk-in Rental",
        address: "88 Zhongshamao Street, Jinjiang District",
        lat: 30.6552,
        lng: 104.0806,
        symbol: "CD",
        color: "#2563EB"
      },
      {
        id: "london-kings-cross",
        city: "London",
        name: "King's Cross Mobility Hub",
        type: "Reservation + Return Counter",
        address: "42 York Way, King's Cross Central",
        lat: 51.5362,
        lng: -0.1255,
        symbol: "KC",
        color: "#F59E0B"
      },
      {
        id: "singapore-bugis",
        city: "Singapore",
        name: "Bugis Urban Ride Lab",
        type: "Flagship + Premium Fleet",
        address: "200 Victoria Street, Bugis Junction",
        lat: 1.299,
        lng: 103.8558,
        symbol: "BG",
        color: "#10B981"
      }
    ])

    const AMAP_KEY_NAME = "ScooterGo-Demo"
    const AMAP_JSAPI_KEY = "7cd1345370762e933fbfceed024698e0"
    let AMapRuntime = null
    let map = null
    let currentInfoWindow = null
    let currentPopupData = null
    let mapReady = false
    const markers = {}
    const storeMarkers = {}
    let currentFilter = "ALL"
    let userMarker = null

    function formatCny(value) {
      const amount = Number(value || 0).toFixed(2)
      return `RMB ${amount}`
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;")
    }

    function getStatusMeta(status) {
      return STATUS_META[status] || STATUS_META.MAINTENANCE
    }

    function getCoordinates(scooter) {
      const lat = Number(scooter?.latitude)
      const lng = Number(scooter?.longitude)

      if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
        return null
      }

      return [lat, lng]
    }

    function getStoreCoordinates(store) {
      const lat = Number(store?.lat)
      const lng = Number(store?.lng)

      if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
        return null
      }

      return [lat, lng]
    }

    function toAmapPosition(coordinates) {
      if (!Array.isArray(coordinates) || coordinates.length < 2) return null
      const lat = Number(coordinates[0])
      const lng = Number(coordinates[1])
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null
      return [lng, lat]
    }

    function toLatLng(position) {
      if (!position) return null
      if (Array.isArray(position)) {
        const lng = Number(position[0])
        const lat = Number(position[1])
        return Number.isFinite(lat) && Number.isFinite(lng) ? [lat, lng] : null
      }

      const lng = Number(typeof position.getLng === "function" ? position.getLng() : position.lng)
      const lat = Number(typeof position.getLat === "function" ? position.getLat() : position.lat)
      return Number.isFinite(lat) && Number.isFinite(lng) ? [lat, lng] : null
    }

    function normalizeHexColor(value, fallback = "#2563EB") {
      const color = String(value || "").trim()
      return /^#[0-9A-Fa-f]{6}$/.test(color) ? color : fallback
    }

    function darkenHexColor(hexColor) {
      const color = normalizeHexColor(hexColor).slice(1)
      const channels = [0, 2, 4].map((index) => {
        const value = Math.max(0, Math.round(parseInt(color.slice(index, index + 2), 16) * 0.78))
        return value.toString(16).padStart(2, "0")
      })
      return `#${channels.join("")}`
    }

    function buildMarkerHtml(status) {
      const statusMeta = getStatusMeta(status)
      return `
        <div style="height:32px;width:32px;" class="${statusMeta.markerClass}">
          <div class="marker-inner">${UI_TEXT.avatarLabel}</div>
        </div>
      `
    }

    function makeIcon(status) {
      return buildMarkerHtml(status)
    }

    function buildStoreMarkerHtml(store) {
      const color = normalizeHexColor(store?.color)
      const colorDark = darkenHexColor(color)
      const symbol = escapeHtml(store?.symbol || "ST")
      return `
        <div class="store-marker" style="--store-color:${color};--store-color-dark:${colorDark};">
          <div class="store-marker-inner">${symbol}</div>
        </div>
      `
    }

    function makeStoreIcon(store) {
      return buildStoreMarkerHtml(store)
    }

    function buildStorePopup(store) {
      const color = normalizeHexColor(store?.color)
      const city = escapeHtml(store?.city || "Store")
      const name = escapeHtml(store?.name || "ScooterGo Store")
      const type = escapeHtml(store?.type || "Store")
      const address = escapeHtml(store?.address || "")

      return `
        <div class="store-popup-card" style="--store-color:${color};">
          <div class="store-popup-eyebrow">${city} Store</div>
          <div class="store-popup-name">${name}</div>
          <div class="store-popup-meta">${type}</div>
          <div class="store-popup-address">${address}</div>
        </div>
      `
    }

    function buildPopup(scooter) {
      const statusMeta = getStatusMeta(scooter?.status)
      const batteryLevel = Number.isFinite(Number(scooter?.batteryLevel))
        ? `${Number(scooter.batteryLevel)}%`
        : UI_TEXT.noValue
      const model = escapeHtml(scooter?.model || "Scooter")
      const location = escapeHtml(scooter?.location || UI_TEXT.noLocation)
      const scooterId = escapeHtml(scooter?.id || UI_TEXT.noValue)
      const isAvailable = scooter?.status === "AVAILABLE"
      const buttonState = isAvailable ? "" : "disabled"

      return `
        <div class="popup-card">
          <div class="popup-header">
            <div class="popup-avatar ${statusMeta.popupClass}">${UI_TEXT.avatarLabel}</div>
            <div class="popup-heading">
              <div class="popup-id">#${scooterId} - ${model}</div>
              <div class="popup-model">${location}</div>
            </div>
          </div>
          <div class="popup-status ${statusMeta.popupClass}">
            <div class="popup-dot"></div>
            ${statusMeta.label}
          </div>
          <div class="popup-meta">
            <div class="popup-meta-item">
              <span class="popup-meta-label">${UI_TEXT.batteryLabel}</span>
              <span class="popup-meta-value">${batteryLevel}</span>
            </div>
          </div>
          <div class="popup-price-summary">
            <div class="popup-price-title">${UI_TEXT.packageHeadline}</div>
            <div class="popup-price-note">${UI_TEXT.packageLine}</div>
          </div>
          <button class="popup-btn" ${buttonState} onclick="onRideTap(${Number(scooter?.id) || 0})">
            ${statusMeta.buttonLabel}
          </button>
        </div>
      `
    }

    function openInfoWindow(marker, content, payload, offset = [0, -36]) {
      if (!map || !AMapRuntime || !marker) return

      if (currentInfoWindow) {
        currentInfoWindow.close()
      }

      currentPopupData = payload
      currentInfoWindow = new AMapRuntime.InfoWindow({
        content,
        isCustom: false,
        offset: new AMapRuntime.Pixel(offset[0], offset[1])
      })
      currentInfoWindow.on("close", () => {
        if (currentPopupData) {
          postToUniApp("popupClose", currentPopupData)
        }
        currentPopupData = null
      })
      currentInfoWindow.open(map, marker.getPosition())
    }

    function renderScooters(scooters) {
      if (!map || !AMapRuntime) return
      const nextIds = new Set((Array.isArray(scooters) ? scooters : []).map(scooter => Number(scooter?.id)))

      Object.keys(markers).forEach((markerId) => {
        if (!nextIds.has(Number(markerId))) {
          markers[markerId].setMap(null)
          delete markers[markerId]
        }
      })

      ;(Array.isArray(scooters) ? scooters : []).forEach((scooter) => {
        const coordinates = getCoordinates(scooter)
        const position = toAmapPosition(coordinates)
        if (!position) return

        const shouldShow = currentFilter === "ALL" || scooter.status === "AVAILABLE"
        const existingMarker = markers[scooter.id]

        if (existingMarker) {
          existingMarker.setPosition(position)
          existingMarker.setContent(makeIcon(scooter.status))
          existingMarker._scooterData = scooter
          if (shouldShow) {
            if (!existingMarker.getMap()) {
              existingMarker.setMap(map)
            }
          } else {
            existingMarker.setMap(null)
          }
          return
        }

        const marker = new AMapRuntime.Marker({
          position,
          content: makeIcon(scooter.status),
          offset: new AMapRuntime.Pixel(-16, -32),
          zIndex: 100
        })
        marker._scooterData = scooter
        marker.on("click", () => {
          openInfoWindow(marker, buildPopup(marker._scooterData), marker._scooterData, [0, -36])
          postToUniApp("markerTap", marker._scooterData)
        })

        if (shouldShow) {
          marker.setMap(map)
        }

        markers[scooter.id] = marker
      })
    }

    function renderStores(stores) {
      if (!map || !AMapRuntime) return
      const nextIds = new Set((Array.isArray(stores) ? stores : []).map(store => String(store?.id || "")))

      Object.keys(storeMarkers).forEach((storeId) => {
        if (!nextIds.has(storeId)) {
          storeMarkers[storeId].setMap(null)
          delete storeMarkers[storeId]
        }
      })

      ;(Array.isArray(stores) ? stores : []).forEach((store) => {
        const storeId = String(store?.id || "")
        const coordinates = getStoreCoordinates(store)
        const position = toAmapPosition(coordinates)
        if (!storeId || !position) return

        const existingMarker = storeMarkers[storeId]

        if (existingMarker) {
          existingMarker.setPosition(position)
          existingMarker.setContent(makeStoreIcon(store))
          existingMarker._storeData = store
          if (!existingMarker.getMap()) {
            existingMarker.setMap(map)
          }
          return
        }

        const marker = new AMapRuntime.Marker({
          position,
          content: makeStoreIcon(store),
          offset: new AMapRuntime.Pixel(-21, -42),
          zIndex: 900
        })
        marker._storeData = store
        marker.on("click", () => {
          openInfoWindow(marker, buildStorePopup(marker._storeData), marker._storeData, [0, -44])
        })
        marker.setMap(map)
        storeMarkers[storeId] = marker
      })
    }

    function focusStore(payload) {
      if (!map || !AMapRuntime) return
      const storeId = String(payload?.id || "")
      const marker = storeMarkers[storeId]
      const coordinates = marker
        ? toLatLng(marker.getPosition())
        : getStoreCoordinates({ lat: payload?.lat, lng: payload?.lng })

      if (!coordinates) return

      const center = toAmapPosition(coordinates)
      if (!center) return

      const zoom = Number(payload?.zoom) || 15

      map.setZoomAndCenter(zoom, center)

      if (marker) {
        window.setTimeout(() => {
          openInfoWindow(marker, buildStorePopup(marker._storeData), marker._storeData, [0, -44])
        }, 550)
      }
    }

    function focusStoreFromUrl() {
      const params = new URLSearchParams(window.location.search)
      const storeId = params.get("focusStore")
      if (!storeId) return

      const store = DEFAULT_STORES.find(item => item.id === storeId)
      if (!store) return

      window.setTimeout(() => {
        focusStore({
          id: store.id,
          lat: store.lat,
          lng: store.lng,
          zoom: 15
        })
      }, 250)
    }

    function showUserLocation(lat, lng) {
      if (!map || !AMapRuntime) return
      const position = toAmapPosition([lat, lng])
      if (!position) return

      const icon = `
          <div class="user-location-marker">
            <div class="user-pulse"></div>
            <div class="user-dot"></div>
          </div>
        `

      if (userMarker) {
        userMarker.setPosition(position)
      } else {
        userMarker = new AMapRuntime.Marker({
          position,
          content: icon,
          offset: new AMapRuntime.Pixel(-8, -8),
          zIndex: 1200
        })
        userMarker.setMap(map)
      }

      map.setZoomAndCenter(16, position)
    }

    function applyFilter(filter) {
      if (!map) return
      currentFilter = filter
      Object.values(markers).forEach((marker) => {
        const shouldShow = filter === "ALL" || marker._scooterData.status === "AVAILABLE"
        if (shouldShow) {
          if (!marker.getMap()) {
            marker.setMap(map)
          }
        } else {
          marker.setMap(null)
        }
      })
    }

    function onRideTap(scooterId) {
      const marker = markers[scooterId]
      if (marker) {
        postToUniApp("rideTap", marker._scooterData)
      }
    }

    function postToUniApp(type, data) {
      try {
        if (window.uni) {
          window.uni.postMessage({ data: { type, data } })
          return
        }

        window.parent.postMessage(JSON.stringify({ type, data }), "*")
      } catch (error) {
        window.__APP_LOGGER__?.warn?.("[scooter-map] postMessage failed", error)
      }
    }

    window.addEventListener("message", (event) => {
      let payload

      try {
        payload = typeof event.data === "string" ? JSON.parse(event.data) : event.data
      } catch {
        return
      }

      const { cmd, data } = payload || {}

      if (cmd === "updateScooters") renderScooters(data)
      if (cmd === "updateStores") renderStores(data)
      if (cmd === "focusStore" && data) focusStore(data)
      if (cmd === "locate" && data) showUserLocation(data.lat, data.lng)
      if (cmd === "filter" && data) applyFilter(data.filter)
      if (cmd === "flyTo" && data && map) {
        const position = toAmapPosition([data.lat, data.lng])
        if (position) map.setZoomAndCenter(data.zoom || 16, position)
      }
      if (cmd === "closePopup" && currentInfoWindow) currentInfoWindow.close()
    })

    async function initMap() {
      try {
        if (!window.AMapLoader) {
          throw new Error("AMapLoader is unavailable")
        }

        AMapRuntime = await window.AMapLoader.load({
          key: AMAP_JSAPI_KEY,
          version: "2.0",
          plugins: ["AMap.Scale", "AMap.ControlBar", "AMap.Geolocation"]
        })

        map = new AMapRuntime.Map("map", {
          center: toAmapPosition(MAP_DEFAULT_VIEW.center),
          zoom: MAP_DEFAULT_VIEW.zoom,
          resizeEnable: true,
          viewMode: "2D",
          mapStyle: "amap://styles/normal"
        })

        map.addControl(new AMapRuntime.Scale())
        mapReady = true
        renderStores(DEFAULT_STORES)
        focusStoreFromUrl()
        postToUniApp("mapReady", {})
      } catch (error) {
        window.__APP_LOGGER__?.error?.("[scooter-map] Failed to initialize AMap", error)
        postToUniApp("mapError", {
          message: `Map failed to initialize. Please check the ${AMAP_KEY_NAME} AMap Web key and domain binding.`
        })
      }
    }

    window.onload = () => {
      initMap()
    }
  </script>
</body>
</html>
