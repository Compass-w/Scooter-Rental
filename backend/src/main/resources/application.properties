# ==========================================
# Database Configuration
# Override these values with environment variables in each environment.
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/scooter_rental}
spring.datasource.username=${DB_USERNAME:scooter_user}
spring.datasource.password=${DB_PASSWORD:scooter_password}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# ==========================================
# JPA / Hibernate Settings
# ==========================================
# Use PostgreSQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Keep SQL logging off by default for release builds.
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
# Do not auto-update schema, we use manual SQL
spring.jpa.hibernate.ddl-auto=none

# ==========================================
# MyBatis Plus Configuration
# ==========================================
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

# ==========================================
# Application Configuration
# ==========================================
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
app.password-reset-url-template=${PASSWORD_RESET_URL_TEMPLATE:http://localhost:3000/#/pages/reset-password?token={token}}

# ==========================================
# Email / SMS Notification Configuration
# ==========================================
app.notifications.email.enabled=${EMAIL_NOTIFICATIONS_ENABLED:false}
app.notifications.email.from=${EMAIL_FROM:}
app.notifications.sms.enabled=${SMS_NOTIFICATIONS_ENABLED:false}
app.notifications.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.notifications.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.notifications.twilio.from-number=${TWILIO_FROM_NUMBER:}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
