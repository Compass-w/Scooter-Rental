spring.datasource.url=jdbc:h2:mem:scooter_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl
app.password-reset-url-template=http://localhost:3000/#/pages/reset-password?token={token}
app.bootstrap.default-manager.enabled=false
